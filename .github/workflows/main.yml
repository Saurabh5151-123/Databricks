name: Daily CI/CD Pipeline

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: 
     - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5   # ✅ upgraded

      - name: Set up Node.js
        uses: actions/setup-node@v5   # ✅ upgraded
        with:
          node-version: '18'   # your app runtime (this is fine)

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
