name: CI/CD Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if package.json exists
        id: check_package
        run: |
          if [ -f package.json ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_package.outputs.found == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check_package.outputs.found == 'true'
        run: npm install

      - name: Run tests
        if: steps.check_package.outputs.found == 'true'
        run: npm test

      - name: Build
        if: steps.check_package.outputs.found == 'true'
        run: npm run build

      - name: Skip message
        if: steps.check_package.outputs.found == 'false'
        run: echo "⚠️ No Node.js project found, skipping build"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: echo "🚀 Deploy step"
